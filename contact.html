<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contactez Nuit Noire Tattoo pour votre projet de tatouage." />
  <title>Contact - Nuit Noire Tattoo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mini-cream.svg">
</head>
<body data-page="contact">

  <div id="nav-mount"></div>

  <header class="page-header">
    <p class="page-eyebrow" id="page-eyebrow"></p>
    <h1 class="page-title" id="page-title"></h1>
    <p class="page-subtitle" id="page-subtitle"></p>
  </header>

  <section class="contact-layout">

    <!-- Colonne gauche : map + accès + coordonnées -->
    <div class="contact-left">

      <div class="contact-map" id="map">
        <iframe
          id="map-iframe"
          title="Plan d'accès Nuit Noire Tattoo"
          src="https://www.google.com/maps?q=Chemin+des+Coquelicots+7%2C+1214+Vernier%2C+Suisse&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>

      <!-- Encart accès sous la map -->
      <div class="contact-access">
        <p id="access-tpg"></p>
        <p id="access-cff"></p>
        <p id="access-parking"></p>
      </div>

      <div class="contact-details">
        <div class="contact-block">
          <p class="contact-label" data-i18n="label_address">Adresse</p>
          <p class="contact-value" id="contact-address"></p>
        </div>
        <div class="contact-block">
          <p class="contact-label" data-i18n="label_phone">Téléphone</p>
          <p class="contact-value" id="contact-phone"></p>
        </div>
        <div class="contact-block">
          <p class="contact-label" data-i18n="label_direct">Direct</p>
          <p class="contact-value" id="contact-direct"></p>
        </div>
        <div class="contact-block">
          <p class="contact-label" data-i18n="label_hours">Horaires</p>
          <p class="contact-value" id="contact-hours"></p>
        </div>
      </div>

    </div>

    <!-- Colonne droite : formulaire -->
    <div class="contact-right">

      <div class="contact-form-intro">
        <h2 id="form-intro-title"></h2>
        <p id="form-intro-text"></p>
        <p class="form-photos-note" id="form-photos-note"></p>
      </div>

      <form class="contact-form" id="contact-form" onsubmit="return false;">

        <div class="form-row">
          <div class="form-field">
            <label for="form-name" data-i18n="form_name">Nom complet</label>
            <input type="text" id="form-name" name="name" required />
          </div>
          <div class="form-field">
            <label for="form-email" data-i18n="form_email">Email</label>
            <input type="email" id="form-email" name="email" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="form-artist" data-i18n="form_artist">Artiste souhaité</label>
            <select id="form-artist" name="artist">
              <option value="" data-i18n="form_no_pref">- Sans préférence -</option>
              <!-- Options injectées dynamiquement -->
            </select>
          </div>
          <div class="form-field">
            <label for="form-subject" data-i18n="form_subject">Type de demande</label>
            <select id="form-subject" name="subject">
              <option value="Nouveau projet" data-i18n="form_subject_new">Nouveau projet</option>
              <option value="Retouche" data-i18n="form_subject_touch">Retouche</option>
              <option value="Question" data-i18n="form_subject_q">Question</option>
              <option value="Autre" data-i18n="form_subject_other">Autre</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label for="form-placement" data-i18n="form_placement">Emplacement et taille approximative</label>
          <input type="text" id="form-placement" name="placement" data-i18n-ph="form_placement_ph" placeholder="ex. avant-bras, environ 15 cm" />
        </div>

        <div class="form-field">
          <label for="form-message" data-i18n="form_message">Description du projet</label>
          <textarea id="form-message" name="message" rows="6" required data-i18n-ph="form_message_ph" placeholder="Décrivez votre idée, ambiance, références, contraintes…"></textarea>
        </div>

        <div class="form-field">
          <label for="form-availability" data-i18n="form_availability">Disponibilités</label>
          <input type="text" id="form-availability" name="availability" data-i18n-ph="form_availability_ph" placeholder="ex. après-midi en semaine, week-ends…" />
        </div>

        <div class="form-submit-row">
          <button type="button" id="form-submit" class="form-submit">
            <span data-i18n="form_submit">Envoyer le message</span>
            <span class="form-submit-arrow">→</span>
          </button>
          <p class="form-disclaimer">
            <span data-i18n="form_disclaimer_1">Le bouton ouvre votre client mail.</span><br>
            <span data-i18n="form_disclaimer_2">Si ça ne fonctionne pas, écrivez à</span> <a href="" id="fallback-email"></a>
          </p>
        </div>

      </form>

    </div>

  </section>

  <div id="footer-mount"></div>

  <script src="js/i18n.js"></script>
  <script src="js/partials.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
