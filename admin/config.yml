# =============================================================
# Nuit Noire Tattoo - Configuration Decap CMS (bilingue FR / EN)
# =============================================================
# Pour modifier le contenu du site, va sur : /admin/
# Chaque texte traduisible a deux champs : Francais et English.
# Les textes d'interface (boutons, libelles du formulaire...) sont
# dans la collection "Textes d'interface" tout en bas - la plupart
# du temps tu n'auras pas besoin d'y toucher.
# =============================================================

backend:
  name: git-gateway
  repo: thibaudps/nuitnoiretattoo
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/ce3448f1-2a51-4357-b24f-c64dcde60751/pkce
  auth_token_endpoint: /sites/ce3448f1-2a51-4357-b24f-c64dcde60751/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: 'Creation {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Modification {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Suppression {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Suppression "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://nuitnoiretattoo.pages.dev
display_url: https://nuitnoiretattoo.pages.dev
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
locale: fr

editor:
  preview: false

collections:


  # -----------------------------------------------------------
  # 1. ACCUEIL
  # -----------------------------------------------------------
  - name: "home"
    label: "🏠 Accueil"
    label_singular: "Accueil"
    description: "Contenu de la page d'accueil : phrases d'animation, presentation, photos."
    delete: false
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "Page d'accueil"
        file: "data/home.json"
        fields:
          - label: "Phrases qui defilent dans l'animation"
            name: "phrases"
            widget: "list"
            summary: "{{fields.text.fr}}"
            hint: "Les phrases apparaissent dans l'ordre, apres le logo."
            fields:

              - label: "Phrase"
                name: "text"
                widget: "object"
                fields:
                  - label: "🇫🇷 Francais"
                    name: "fr"
                    widget: "string"
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "string"


          - label: "Texte de presentation"
            name: "intro_text"
            widget: "object"
            hint: "Le texte court sous l'animation."
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"


          - label: "Titre de la section photos"
            name: "latest_work_title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Derniers travaux"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Latest work"


          - label: "Lien Instagram affiche a droite du titre"
            name: "instagram_handle"
            widget: "string"
            default: "@nuitnoiretattoo"


          - label: "Photos du carrousel (Latest work)"
            name: "latest_work"
            widget: "list"
            summary: "{{fields.alt}}"
            hint: "Format recommande : 1080x1440 px (portrait). Idealement 6 photos."
            fields:
              - label: "Image"
                name: "image"
                widget: "image"
              - label: "Description (texte alternatif)"
                name: "alt"
                widget: "string"
                required: false
              - label: "Lien externe (optionnel)"
                name: "link"
                widget: "string"
                required: false
                hint: "Si renseigne, un clic sur la photo ouvre ce lien."


  # -----------------------------------------------------------
  # 2. ARTISTES
  # -----------------------------------------------------------
  - name: "artists_settings"
    label: "🎨 Artistes - Reglages"
    description: "En-tete de la page artistes."
    delete: false
    files:
      - name: "artists_page"
        label: "En-tete de la page Artistes"
        file: "data/artists-page.json"
        fields:

          - label: "Etiquette (eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Nuit Noire's"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Nuit Noire's"


          - label: "Titre"
            name: "title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Artistes"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Artists"


          - label: "Sous-titre"
            name: "subtitle"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Huit univers, un seul toit."
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Eight worlds, one roof."


  - name: "artists"
    label: "🎨 Artistes - Liste"
    label_singular: "Artiste"
    description: "Chaque artiste : bio (FR/EN), portrait, portfolio, Instagram."
    folder: "data/artists"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{id}}"
    identifier_field: "name"
    summary: "{{name}} - {{role}}"
    sortable_fields: ['order', 'name']
    view_groups:
      - label: Role
        field: role
    fields:
      - label: "Ordre d'affichage"
        name: "order"
        widget: "number"
        default: 1
        value_type: "int"
        min: 1
        hint: "Ordre des artistes sur la page (1 = en premier)."

      - label: "Nom complet"
        name: "name"
        widget: "string"

      - label: "Identifiant (slug)"
        name: "id"
        widget: "string"
        hint: "Nom de fichier et ancre URL. Minuscules, chiffres, tirets. Ne pas modifier apres creation."
        pattern: ['^[a-z0-9-]+$', "Que des minuscules, chiffres et tirets"]

      - label: "Role"
        name: "role"
        widget: "select"
        options: ["Fondateur", "Fondatrice", "Résident", "Résidente", "Invité", "Invitée"]
        default: "Résident"
        hint: "La traduction anglaise est automatique (Founder / Resident / Guest)."

      - label: "Page Guests"
        name: "guest"
        widget: "boolean"
        default: false
        required: false
        hint: "Coche pour la page guests : nom en italique, layout simplifie."


      - label: "Bio (francais)"
        name: "bio"
        widget: "text"
        required: false
        hint: "Petit texte de presentation (2-3 phrases). Optionnel pour les guests."


      - label: "Bio (English)"
        name: "bio_en"
        widget: "text"
        required: false
        hint: "Traduction anglaise. Laisser vide = la version francaise s'affiche aussi en anglais."


      - label: "Portrait"
        name: "portrait"
        widget: "image"
        required: false
        hint: "Format portrait recommande : 1080x1440 px."

      - label: "Compte Instagram"
        name: "instagram"
        widget: "string"
        required: false
        hint: "Sans le @ devant. Ex. : 'vincepages_tattoo'"

      - label: "Portfolio (photos de tatouages)"
        name: "portfolio"
        widget: "list"
        required: false
        summary: "{{fields.alt}}"
        hint: "Format recommande : 1080x1440 px (portrait)."
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
          - label: "Description"
            name: "alt"
            widget: "string"
            required: false


  # -----------------------------------------------------------
  # 3. SHOP
  # -----------------------------------------------------------
  - name: "shop_settings"
    label: "🛍 Shop - Reglages"
    description: "En-tete et textes de la page Shop."
    delete: false
    files:
      - name: "shop_page"
        label: "En-tete + textes de la page Shop"
        file: "data/shop-page.json"
        fields:

          - label: "Etiquette (eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Boutique"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Shop"


          - label: "Titre"
            name: "title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Shop"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Shop"


          - label: "Sous-titre"
            name: "subtitle"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Flashs, tirages, objets du shop."
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Flashes, prints, shop goods."


          - label: "Texte 'Commander'"
            name: "order_info"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
                default: "Pour acquerir un flash ou un tirage, contactez-nous directement par email ou via Instagram."
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"
                default: "To get a flash or a print, contact us directly by email or via Instagram."


          - label: "Texte 'Flashs'"
            name: "flash_info"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
                default: "Les designs marques 'flash' sont des modeles uniques, tatoues une seule fois. Une fois reserves, ils ne sont plus disponibles."
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"
                default: "Designs marked 'flash' are unique pieces, tattooed only once. Once reserved, they are no longer available."


  - name: "products"
    label: "🛍 Shop - Produits"
    label_singular: "Produit"
    description: "Flashs, tirages et merch du shop."
    folder: "data/products"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} - {{price}}"
    sortable_fields: ['name', 'category', 'available']
    view_groups:
      - label: Categorie
        field: category
      - label: Disponibilite
        field: available
    fields:
      - label: "Nom du produit"
        name: "name"
        widget: "string"

      - label: "Categorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Flash (tatouage unique)", value: "flash" }
          - { label: "Tirage / Print", value: "print" }
          - { label: "Merch (textile, accessoires)", value: "merch" }
        default: "flash"

      - label: "Artiste"
        name: "artist"
        widget: "string"
        hint: "Nom de l'artiste auteur du produit (ou 'Nuit Noire')."

      - label: "Prix"
        name: "price"
        widget: "string"
        hint: "Ex. : '350 CHF', '40 EUR'"

      - label: "Image"
        name: "image"
        widget: "image"


      - label: "Description (francais)"
        name: "description"
        widget: "text"
        required: false


      - label: "Description (English)"
        name: "description_en"
        widget: "text"
        required: false
        hint: "Traduction anglaise. Laisser vide = la version francaise s'affiche aussi en anglais."


      - label: "Disponible"
        name: "available"
        widget: "boolean"
        default: true
        hint: "Decoche si le flash est reserve ou le produit epuise."


  # -----------------------------------------------------------
  # 4. CONTACT
  # -----------------------------------------------------------
  - name: "contact"
    label: "✉️ Contact"
    description: "Infos du shop et textes de la page contact."
    delete: false
    files:
      - name: "contact_page"
        label: "Page Contact"
        file: "data/contact.json"
        fields:

          - label: "Etiquette (eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Une idee ?"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "An idea?"


          - label: "Titre"
            name: "title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Contact"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Contact"


          - label: "Sous-titre"
            name: "subtitle"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Ecrivez-nous, ou passez nous voir au shop."
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Write to us, or drop by the shop."


          - label: "Adresse"
            name: "address"
            widget: "object"
            hint: "Une ligne par retour a la ligne."
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"


          - label: "Telephone"
            name: "phone"
            widget: "string"
            required: false
            default: "+41 (0)22 341 18 82"


          - label: "Acces TPG"
            name: "access_tpg"
            widget: "object"
            required: false
            hint: "Affiche sous la carte. Laisser vide pour masquer."
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                required: false
                default: "Arret Blandonnet"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
                default: "Blandonnet stop"


          - label: "Acces CFF"
            name: "access_cff"
            widget: "object"
            required: false
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                required: false
                default: "Arret Vernier"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
                default: "Vernier station"


          - label: "Parking"
            name: "parking"
            widget: "object"
            required: false
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                required: false
                default: "Centre Commercial Blandonnet"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
                default: "Blandonnet shopping centre"


          - label: "Adresse pour la carte Google Maps"
            name: "map_query"
            widget: "string"
            default: "Chemin des Coquelicots 7, 1214 Vernier, Suisse"
            hint: "Adresse envoyee a Google Maps pour centrer la carte."


          - label: "Horaires"
            name: "hours"
            widget: "object"
            hint: "Texte libre. Ex. : Mardi - Samedi / 11h - 19h"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"


          - label: "Note sur les horaires"
            name: "hours_note"
            widget: "object"
            required: false
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                required: false
                default: "Sur rendez-vous"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
                default: "By appointment"


          - label: "Email"
            name: "email"
            widget: "string"
            pattern: ["^[^@]+@[^@]+\\.[^@]+$", "Email invalide"]


          - label: "Compte Instagram"
            name: "instagram"
            widget: "string"
            default: "nuitnoiretattoo"
            hint: "Sans le @ devant."


          - label: "Introduction du formulaire - Titre"
            name: "form_intro_title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Decrivez votre projet"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Describe your project"


          - label: "Introduction du formulaire - Texte"
            name: "form_intro_text"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
                default: "Le bouton ci-dessous ouvrira votre application mail avec un message pre-rempli. Plus vos informations sont precises, plus la reponse sera rapide."
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"
                default: "The button below opens your mail app with a pre-filled message. The more precise your details, the faster the reply."


          - label: "Note photos (formulaire)"
            name: "form_photos_note"
            widget: "object"
            required: false
            hint: "Phrase sous l'intro. Laisser vide pour masquer."
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "text"
                required: false
                default: "Vous pouvez joindre a votre email des photos de reference et/ou de l'emplacement souhaite, dans la limite de 4 photos."
              - label: "🇬🇧 English"
                name: "en"
                widget: "text"
                required: false
                default: "You can attach reference photos and/or photos of the desired placement to your email, up to 4 photos."


  # -----------------------------------------------------------
  # 5. FAQ
  # -----------------------------------------------------------
  - name: "faq"
    label: "❓ FAQ"
    description: "Questions frequentes."
    delete: false
    files:
      - name: "faq_page"
        label: "Page FAQ"
        file: "data/faq.json"
        fields:

          - label: "Etiquette (eyebrow)"
            name: "eyebrow"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Questions frequentes"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Frequently asked"


          - label: "Titre"
            name: "title"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "FAQ"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "FAQ"


          - label: "Sous-titre"
            name: "subtitle"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "Reponses aux questions frequentes."
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Answers to common questions."


          - label: "Questions"
            name: "items"
            widget: "list"
            summary: "{{fields.question.fr}}"
            hint: "Ajoute, supprime et reorganise les questions par glisser-deposer."
            fields:

              - label: "Question"
                name: "question"
                widget: "object"
                fields:
                  - label: "🇫🇷 Francais"
                    name: "fr"
                    widget: "string"
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "string"


              - label: "Reponse"
                name: "answer"
                widget: "object"
                hint: "Lien : [texte affiche](adresse). Ex. [email](contact.html)."
                fields:
                  - label: "🇫🇷 Francais"
                    name: "fr"
                    widget: "text"
                  - label: "🇬🇧 English"
                    name: "en"
                    widget: "text"


  # -----------------------------------------------------------
  # 6. REGLAGES GENERAUX
  # -----------------------------------------------------------
  - name: "settings"
    label: "⚙️ Reglages generaux"
    description: "Infos de la barre de navigation et du pied de page."
    delete: false
    files:
      - name: "footer"
        label: "Pied de page + bouton contact"
        file: "data/settings.json"
        fields:
          - label: "Telephone"
            name: "footer_phone"
            widget: "string"
            default: "+41 (0)22 341 18 82"
            hint: "Affiche dans le footer et utilise par le bouton contact flottant."

          - label: "Horaires"
            name: "footer_hours"
            widget: "object"
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                default: "lun - sam : 10h30 - 17h30"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                default: "Mon - Sat: 10:30 - 17:30"


          - label: "Note horaires"
            name: "footer_hours_note"
            widget: "object"
            required: false
            fields:
              - label: "🇫🇷 Francais"
                name: "fr"
                widget: "string"
                required: false
                default: "dim : ferme"
              - label: "🇬🇧 English"
                name: "en"
                widget: "string"
                required: false
                default: "Sun: closed"


          - label: "Heure d'ouverture"
            name: "open_from"
            widget: "string"
            default: "10:30"
            pattern: ['^\d{1,2}:\d{2}$', "Format 24h attendu, ex. 10:30"]
            hint: "Format 24h HH:MM. Badge Open/Closed du bouton contact."
          - label: "Heure de fermeture"
            name: "open_until"
            widget: "string"
            default: "17:30"
            pattern: ['^\d{1,2}:\d{2}$', "Format 24h attendu, ex. 17:30"]
          - label: "Jours d'ouverture"
            name: "open_days"
            widget: "select"
            multiple: true
            options:
              - { label: "Lundi", value: "1" }
              - { label: "Mardi", value: "2" }
              - { label: "Mercredi", value: "3" }
              - { label: "Jeudi", value: "4" }
              - { label: "Vendredi", value: "5" }
              - { label: "Samedi", value: "6" }
              - { label: "Dimanche", value: "0" }
            default: ["1", "2", "3", "4", "5", "6"]
            hint: "Jours ou le badge peut afficher Open."
          - label: "Email"
            name: "footer_email"
            widget: "string"
            default: "info@nuitnoiretattoo.com"
            hint: "Affiche dans le footer et utilise par le bouton contact flottant."
          - label: "Adresse complete"
            name: "footer_address"
            widget: "string"
            default: "Ch. des Coquelicots, 7 - 1214 Vernier - Switzerland."
          - label: "Lien Instagram global"
            name: "instagram_url"
            widget: "string"
            default: "https://instagram.com/nuitnoiretattoo"


  # -----------------------------------------------------------
  # 7. TEXTES D'INTERFACE (boutons, libelles, emails...)
  # -----------------------------------------------------------
  # La plupart du temps tu n'as PAS besoin d'y toucher : ce sont
  # les petits textes de l'interface. Chacun a sa version FR et EN.
  - name: "ui_strings"
    label: "🔤 Textes d'interface"
    description: "Boutons, libelles du formulaire, textes du bouton flottant, emails. FR / EN."
    delete: false
    files:
      - name: "ui"
